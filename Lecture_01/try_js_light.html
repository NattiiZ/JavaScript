<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligh</title>
</head>

<body>
    <h2>What Can JavaScript Do?</h2>
    
    <p>JavaScript can change HTML attribute value</p>
    <p>In this case JavaScript change the value of the src (source) attribute of an image</p>

    <button onclick="document.getElementById('myLight').src='img/pic_bulbon.gif'">
        Turn on the light
    </button>

    <img id="myLight" src="img/pic_bulboff.gif" style="width: 100px;">
    
    <button onclick="document.getElementById('myLight').src='img/pic_bulboff.gif'">
        Turn off the light
    </button>
</body>

</html>
